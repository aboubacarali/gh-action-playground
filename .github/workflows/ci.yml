name: CI

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6

      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        run: npm test

